<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>3D 贪吃蛇</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="hud">
      <h1>3D 贪吃蛇</h1>
      <p>分数：<span id="score">0</span></p>
      <p>最高分：<span id="best-score">0</span></p>
      <p>方向：W/A/S/D、方向键或触控按钮</p>
      <p>拖动鼠标可旋转视角，滚轮可缩放</p>
      <button id="music-toggle" type="button">🎵 背景音乐：开</button>
      <p id="status">游戏进行中...</p>
      <pre id="diag"></pre>

      <div class="leaderboard">
        <h3>🏆 排行榜（Top 5）</h3>
        <ol id="leaderboard-list"></ol>
      </div>
    </div>

    <div id="game-over" class="overlay hidden" role="dialog" aria-modal="true">
      <div class="panel">
        <h2>💀 游戏结束</h2>
        <p>本局得分：<span id="final-score">0</span></p>
        <p>历史排名：<span id="final-rank">-</span></p>
        <button id="restart-btn" type="button">再来一局</button>
      </div>
    </div>

    <div class="touch-controls" aria-label="移动控制">
      <button data-dir="up">↑</button>
      <div class="mid-row">
        <button data-dir="left">←</button>
        <button data-dir="down">↓</button>
        <button data-dir="right">→</button>
      </div>
    </div>

    <canvas id="game"></canvas>

    <script>
      (function () {
        function appendDiag(message) {
          var el = document.getElementById("diag");
          if (el) el.textContent += message + "\n";
          console.log("[DIAG]", message);
        }

        function showBlockedStatus(extra) {
          var st = document.getElementById("status");
          if (st) st.textContent = "❌ 资源被阻止/403：请更换网络（手机热点/家庭网络）或稍后重试";
          appendDiag(extra);
        }

        fetch("vendor/three.min.js", { cache: "no-store" })
          .then(function (response) {
            if (!response.ok) {
              showBlockedStatus("vendor/three.min.js fetch failed: HTTP " + response.status);
            } else {
              appendDiag("vendor/three.min.js fetch ok: HTTP " + response.status);
            }
          })
          .catch(function (error) {
            showBlockedStatus("vendor/three.min.js fetch error: " + (error && error.message ? error.message : error));
          });

        function load(src, cb) {
          var s = document.createElement("script");
          s.src = src;
          s.onload = cb;
          s.onerror = function () {
            var st = document.getElementById("status");
            if (st) st.textContent = "❌ 脚本加载失败: " + src + "（请检查 Pages 部署/网络/缓存）";
            appendDiag("script load error: " + src);
            console.error("failed to load", src);
          };
          document.body.appendChild(s);
        }

        load("vendor/three.min.js", function () {
          load("vendor/OrbitControls.js", function () {
            load("game.js");
          });
        });
      })();
    </script>
  </body>
</html>
