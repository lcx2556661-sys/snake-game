<!doctype html>
<html lang="zh-CN">
  <script src="https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.166.1/examples/js/controls/OrbitControls.js"></script>
<script src="game.js"></script>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>3D 贪吃蛇</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="hud">
      <h1>3D 贪吃蛇</h1>
      <p>分数：<span id="score">0</span></p>
      <p>最高分：<span id="best-score">0</span></p>
      <p>方向：W/A/S/D、方向键或触控按钮</p>
      <p>拖动鼠标可旋转视角，滚轮可缩放</p>
      <button id="music-toggle" type="button">🎵 背景音乐：开</button>
      <p id="status">游戏进行中...</p>
      <p id="status">按空格开始 / 重新开始</p>

      <div class="leaderboard">
        <h3>🏆 排行榜（Top 5）</h3>
        <ol id="leaderboard-list"></ol>
      </div>
    </div>

    <div id="game-over" class="overlay hidden" role="dialog" aria-modal="true">
      <div class="panel">
        <h2>💀 游戏结束</h2>
        <p>本局得分：<span id="final-score">0</span></p>
        <p>历史排名：<span id="final-rank">-</span></p>
        <button id="restart-btn" type="button">再来一局</button>
      </div>
    </div>

    <div class="touch-controls" aria-label="移动控制">
      <button data-dir="up">↑</button>
      <div class="mid-row">
        <button data-dir="left">←</button>
        <button data-dir="down">↓</button>
        <button data-dir="right">→</button>
      </div>
    </div>

    <canvas id="game"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.166.1/examples/js/controls/OrbitControls.js"></script>
    <script src="game.js"></script>
    <script src="game.js"></script>
  </body>
</html>
